AWSTemplateFormatVersion: '2010-09-09'
Description: 'Infrastructure for the ECS Fargate deployment pattern workshop service.'
Parameters:
  # Standard parameters
  Zone:
    Type: 'String'
  Site:
    Type: 'String'
  Solution:
    Type: 'String'
  Environment:
    Type: 'String'
  Component:
    Type: 'String'
  Flavour:
    Type: 'String'
    Default: ''
  Version:
    Type: 'String'
  Launch:
    Type: 'String'
  RegionalPrefix:
    Type: 'String'
  # Parameters specific to this stack
  PrivateA:
    Type: 'String'
  PrivateB:
    Type: 'String'
  PrivateC:
    Type: 'String'
  VpcId:
    Type: 'String'
  CiSecurityGroupId:
    Type: 'String'
  HostedZoneId:
    Type: 'String'
  ALBName:
    Type: 'String'
  DeAccountNumber:
    Type: 'String'
  ContainerPort:
    Type: 'String'
    Default: '8443'
  ALBListenerPort:
    Type: 'String'
    Default: '443'
  UserIdentifier:
    Type: 'String'
    Default: 'Placeholder'
  UserPartition:
    Type: 'String'
    Default: 'Placeholder'

Resources:
  TaskSet:
    Type: 'AWS::ECS::TaskSet'
    Properties:
      Cluster: !Ref 'Cluster'
      Service: !Ref 'Service'
      TaskDefinition: !Ref 'TaskDefinition'
      LaunchType: 'FARGATE'
      NetworkConfiguration:
        AwsVpcConfiguration:
          AssignPublicIp: 'ENABLED'
          SecurityGroups:
            - !Ref 'SecurityGroup'
          Subnets:
            - !Ref 'SubnetA'
            - !Ref 'SubnetB'
            - !Ref 'SubnetC'
      LoadBalancers:
        - ContainerName: !Ref 'ContainerName'
          ContainerPort: !Ref 'ContainerPort'
          TargetGroupArn: !Ref 'TargetGroup'
      PlatformVersion: 'LATEST'
      Scale: !Ref 'Scale'
      ServiceRegistries:
        - ContainerName: !Ref 'ContainerName'
          ContainerPort: !Ref 'ContainerPort'
          RegistryArn: !Ref 'ServiceDiscoveryRegistry'
      HealthCheckGracePeriodSeconds: 90
      SchedulingStrategy: 'REPLICA'
      ServiceDiscovery: !Ref 'ServiceDiscovery'

  #------------------------------------------------
  # ECS task definition
  #------------------------------------------------
  ComponentTaskDefinition:
    Type: 'AWS::ECS::TaskDefinition'
    Properties:
      ContainerDefinitions:
        - Image: !Sub '${DeAccountNumber}.dkr.ecr.${AWS::Region}.${AWS::URLSuffix}/${Component}:${Version}'
          Name: !Ref Component
          PortMappings:
            - ContainerPort: !Ref ContainerPort
          LogConfiguration:
            LogDriver: 'awslogs'
            Options:
              awslogs-create-group: true
              awslogs-region: !Ref AWS::Region
              awslogs-group: !Sub '/wcar/fargate/${Solution}-${Environment}-${Component}'
              awslogs-stream-prefix: !Ref Component
          Environment:
            # Normally mandatory (but e.g. SHORTNAME and FLAVOUR may not always be applicable)
            - Name: 'ZONE'
              Value: !Ref Zone
            - Name: 'SITE'
              Value: !Ref Site
            - Name: 'SOLUTION'
              Value: !Ref Solution
            - Name: 'ENVIRONMENT'
              Value: !Ref Environment
            - Name: 'COMPONENT'
              Value: !Ref Component
            - Name: 'VERSION'
              Value: !Ref Version
            - Name: 'LAUNCH'
              Value: !Ref Launch
            - Name: 'FLAVOUR'
              Value: !Ref Flavour
            # Additional variables can be added here if needed
            - Name: 'USER_ID'
              Value: !Ref UserIdentifier
            - Name: 'USER_PARTITION'
              Value: !Ref UserPartition
      Cpu: 512
      ExecutionRoleArn: !GetAtt ComponentTaskDefinitionExecutionRole.Arn
      TaskRoleArn: !GetAtt ComponentTaskDefinitionRole.Arn
      Family: !Ref Component
      Memory: 1024
      RequiresCompatibilities:
        - 'FARGATE'

  #------------------------------------------------
  # ECS Service
  #------------------------------------------------
  ComponentEcsService:
    Type: 'AWS::ECS::Service'
    DependsOn: DummyListenerRule
    Properties:
      Cluster:
        Fn::ImportValue: !Sub 'group${UserPartition}-ecs-fargate-ws-cluster-arn'
      DesiredCount: 1
      LaunchType: 'FARGATE'
      LoadBalancers:
        - ContainerName: !Ref Component
          ContainerPort: !Ref ContainerPort
          TargetGroupArn: !Ref ComponentTargetGroup
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: 'ENABLED'
          SecurityGroups:
            - !Ref ComponentEcsServiceSecurityGroup
            - !Ref CiSecurityGroupId
          Subnets:
            - !Ref PrivateA
            - !Ref PrivateB
            - !Ref PrivateC
      ServiceName: !Sub '${RegionalPrefix}-${Component}-${Version}-${Launch}'
      TaskDefinition: !Ref ComponentTaskDefinition
      PropagateTags: 'TASK_DEFINITION'
      # Note: The value has been lowered from the recommended 180, for production use please choose this value wisely.
      HealthCheckGracePeriodSeconds: 90
