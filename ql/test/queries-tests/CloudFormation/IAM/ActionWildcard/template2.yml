AWSTemplateFormatVersion: '2010-09-09'
Description: 'Security: Account Enable Guardduty'
Resources:
  MyRandomRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: RoleOne
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: 'lambda.amazonaws.com'
          Action:
          - 'sts:AssumeRole'
      Path: '/'
      ManagedPolicyArns:
      - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
      - PolicyName: iamguardduty
        PolicyDocument:
          Statement:
          - Effect: Allow
            Action:
            - 'guardduty:*'
            - 'iam:CreateServiceLinkedRole'
            Resource: '*'
  MyRandomRole2:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: RoleTwo
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: 'lambda.amazonaws.com'
          Action:
          - '*'
      Path: '/'
      ManagedPolicyArns:
      - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
      - PolicyName: one
        PolicyDocument:
          Statement:
          - Effect: Allow
            Action: 'guardduty'
            Resource: '*'
      - PolicyName: two
        PolicyDocument:
          Statement:
          - Effect: Allow
            Action: "*"
            Resource: '*'



