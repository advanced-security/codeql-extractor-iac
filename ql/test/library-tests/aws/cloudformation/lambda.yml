AWSTemplateFormatVersion: '2010-09-09'
Description: 'Security: Account Enable Guardduty'
Resources:
  LambdaFunctionEnableGuardDuty:
    Type: 'AWS::Lambda::Function'
    Properties:
      Code:
        ZipFile: |
          'use strict';
          const AWS = require('aws-sdk');
          const response = require('cfn-response');
          const guardduty = new AWS.GuardDuty();
          var detectorIds = [];
          
          exports.handler = (event, context, cb) => {
              console.log(`Invoke: ${JSON.stringify(event)}`);
              const done = (err) => {
                  if (err) {
                      console.log(`Error: ${JSON.stringify(err)}`);
                      response.send(event, context, response.SUCCESS, {});
                  } else {
                      response.send(event, context, response.SUCCESS, {});
                  }
              };
          
              if (event.RequestType === 'Create' || event.RequestType === 'Update' || event.RequestType === 'Delete') {
               guardduty.listDetectors({}, done);
               guardduty.listDetectors({}, function(err, data) {
                    if (err) console.log(`Error: ${JSON.stringify(err)}`);
                    else {
                        console.log(data);
                        detectorIds = data.DetectorIds;
                        
                         if (detectorIds.length == 0) {
                             var params = {
                                 Enable: true
                             };
               
                             guardduty.createDetector(params, function(err2, data2) {
                                 if (err2) console.log(`Error: ${JSON.stringify(err2)}`);
                                 else console.log(data2); // successful response
                             });
                             guardduty.listDetectors({}, function(err3, data3) {
                               if (err3) console.log(`Error: ${JSON.stringify(err3)}`);
                               else {
                                     console.log(data3); // successful response
                                     detectorIds = data3.DetectorIds
                                 }
                             });
                        }
                      }
                  });
                  guardduty.listDetectors({}, function(err3, data3) {
                    if (err3) console.log(`Error: ${JSON.stringify(err3)}`);
                    else {
                       console.log(data3); // successful response
                       detectorIds = data3.DetectorIds
                       guardduty.listInvitations({}, function(err, data) {
                           if (err) console.log(`Error: ${JSON.stringify(err)}`);
                           else {
                             console.log(data);
                             var i;
                                for (i = 0; i < data.Invitations.length; i++) {
                                    if (data.Invitations[i].AccountId == '405112940816' && detectorIds.length > 0) {                                    
                                       if (data.Invitations[i].RelationshipStatus == 'Invited') {
                                       var params = {
                                            InvitationId: data.Invitations[i].InvitationId,
                                            MasterId: '405112940816',
                                            DetectorId: detectorIds[0]
                                       };
                                       guardduty.acceptInvitation(params, function(err, data) {
                                            if (err) console.log(`Error: ${JSON.stringify(err)}`);
                                            else {
                                               console.log(data);
                                            }     
                                       });
                                       }                
                                    }
                               }
                            }
                        });                      
                       }
                  });
              }
          };          
      Handler: 'index.handler'
      MemorySize: 128
      Role: !GetAtt 'LambdaRole.Arn'
      Runtime: 'nodejs16.x'
      Tags: 
        - Key: 'wcar-service'
          Value: 'provisioning-security-guardduty'
        - Key: 'team'
          Value: 'sec-ops'    
      Timeout: 120